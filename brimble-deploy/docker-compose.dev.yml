name: brimble

networks:
  brimble-network:
    driver: bridge

volumes:
  rabbitmq_data:
  redis-data:
  redis-insight-data:
  prom_data:
  grafana_data:
  postgres_data:
  workspaces_data:
  buildkit_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: brimble_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: brimble
      POSTGRES_PASSWORD: brimblepass
      POSTGRES_DB: brimble
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - brimble-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brimble -d brimble"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  redis:
    image: redis:7.2-alpine
    container_name: brimble_redis
    command: >
      redis-server
      --loglevel notice
      --maxmemory 512mb
      --maxmemory-policy volatile-lru
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite no
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --save 900 1
      --save 300 10
      --save 60 10000
      --stop-writes-on-bgsave-error yes
      --rdbcompression yes
      --activerehashing yes
      --hz 20
      --slowlog-log-slower-than 10000
      --slowlog-max-len 256
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - brimble-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 600M
        reservations:
          memory: 128M

  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: brimble_redis_insight
    ports:
      - "8001:8001"
    networks:
      - brimble-network
    volumes:
      - redis-insight-data:/db
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: brimble_redis_exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - brimble-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: brimble_rabbitmq
    hostname: brimble-rabbit-1
    networks:
      - brimble-network
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-brimble_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-brimble_pass}
      RABBITMQ_DEFAULT_VHOST: brimble
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:latest
    container_name: brimble_rabbitmq_exporter
    environment:
      RABBIT_URL: http://rabbitmq:15672
      RABBIT_USER: ${RABBITMQ_USER:-brimble_user}
      RABBIT_PASSWORD: ${RABBITMQ_PASS:-brimble_pass}
      RABBIT_VHOST: brimble
      PUBLISH_PORT: "9419"
    ports:
      - "9419:9419"
    networks:
      - brimble-network
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: brimble_caddy
    ports:
      - "80:80"
      - "2019:2019"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - brimble-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/caddy/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  buildkit:
    image: moby/buildkit:latest
    container_name: brimble_buildkit
    privileged: true
    restart: unless-stopped
    ports:
      - "1234:1234"
    command:
      - --addr
      - tcp://0.0.0.0:1234
      - --addr
      - unix:///run/buildkit/buildkitd.sock
    networks:
      - brimble-network
    volumes:
      - buildkit_data:/var/lib/buildkit

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: brimble_api
    user: root 
    ports:
      - "3000:3000"
      - "9464:9464"
    env_file:
      - ../.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspaces_data:/app/workspaces
    networks:
      - brimble-network
    depends_on:
      postgres:
        condition: service_healthy
      buildkit:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      caddy:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service,env"
    labels:
      service: brimble-api
      env: development
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    container_name: brimble_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    networks:
      - brimble-network
    restart: unless-stopped
    depends_on:
      - api
      - redis-exporter
      - rabbitmq-exporter

  loki:
    image: grafana/loki:2.9.4
    container_name: brimble_loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - brimble-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.4
    container_name: brimble_promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    networks:
      - brimble-network
    restart: unless-stopped
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.3.1
    container_name: brimble_grafana
    ports:
      - "3001:3000"
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - brimble-network
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
