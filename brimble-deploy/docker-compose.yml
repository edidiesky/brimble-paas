# docker-compose.yml (production)
name: brimble

networks:
  brimble-frontend-network:
    driver: bridge
  brimble-api-network:
    driver: bridge
  brimble-data-network:
    driver: bridge
  brimble-build-network:
    driver: bridge
  brimble-monitoring-network:
    driver: bridge
  brimble-socket-proxy-network:
    driver: bridge
    internal: true

volumes:
  rabbitmq_data:
  redis-data:
  prom_data:
  grafana_data:
  postgres_data:
  workspaces_data:
  buildkit_data:
  buildkit_sock:
  loki_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: brimble_postgres
    ports: []
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - brimble-data-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  redis:
    image: redis:7.2-alpine
    container_name: brimble_redis
    command: >
      redis-server
      --loglevel notice
      --maxmemory 512mb
      --maxmemory-policy volatile-lru
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode yes
      --rename-command CONFIG ""
      --rename-command DEBUG ""
      --rename-command FLUSHALL "BRIMBLE_FLUSHALL"
      --rename-command FLUSHDB "BRIMBLE_FLUSHDB"
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite no
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --save 900 1
      --save 300 10
      --save 60 10000
      --stop-writes-on-bgsave-error yes
      --rdbcompression yes
      --activerehashing yes
      --hz 20
      --slowlog-log-slower-than 10000
      --slowlog-max-len 256
    ports: []
    volumes:
      - redis-data:/data
    networks:
      - brimble-data-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 600M
        reservations:
          memory: 128M

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: brimble_redis_exporter
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports: []
    networks:
      - brimble-data-network
      - brimble-monitoring-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: brimble_rabbitmq
    hostname: brimble-rabbit-1
    networks:
      - brimble-data-network
    ports: []
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: brimble
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  caddy:
    image: caddy:2-alpine
    container_name: brimble_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - brimble-frontend-network
      - brimble-api-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/caddy/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  buildkit:
    image: moby/buildkit:v0.13.2
    container_name: brimble_buildkit
    privileged: true
    restart: unless-stopped
    ports: []
    command:
      - --addr
      - unix:///run/buildkit/buildkitd.sock
    networks:
      - brimble-build-network
    volumes:
      - buildkit_data:/var/lib/buildkit
      - buildkit_sock:/run/buildkit
    security_opt:
      - no-new-privileges:true

  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: brimble_socket_proxy
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 0
      EXEC: 0
      POST: 1
      BUILD: 0
      SWARM: 0
      SYSTEM: 0
      INFO: 1
      AUTH: 0
      SECRETS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - brimble-socket-proxy-network
    restart: unless-stopped
    privileged: true

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: brimble_api
    ports:
      - "3000:3000"
      - "9464:9464"
    environment:
      NODE_ENV: production
      DOCKER_HOST: tcp://socket-proxy:2375
    env_file:
      - ../.env
    volumes:
      - workspaces_data:/app/workspaces
      - buildkit_sock:/run/buildkit:ro
    networks:
      - brimble-api-network
      - brimble-data-network
      - brimble-build-network
      - brimble-socket-proxy-network
    depends_on:
      postgres:
        condition: service_healthy
      buildkit:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      caddy:
        condition: service_healthy
      socket-proxy:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service,env"
    labels:
      service: brimble-api
      env: production
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: brimble_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports: []
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    networks:
      - brimble-monitoring-network
      - brimble-api-network
    restart: unless-stopped
    depends_on:
      - api
      - redis-exporter

  loki:
    image: grafana/loki:2.9.4
    container_name: brimble_loki
    ports: []
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - brimble-monitoring-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.4
    container_name: brimble_promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    networks:
      - brimble-monitoring-network
    restart: unless-stopped
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.3.1
    container_name: brimble_grafana
    ports: []
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ORG_ROLE: ""
      GF_AUTH_BASIC_ENABLED: "true"
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_SECURITY_SECRET_KEY: "${GRAFANA_SECRET_KEY}"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "strict"
      GF_SECURITY_CONTENT_SECURITY_POLICY: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_SERVER_ROOT_URL: "https://${GRAFANA_DOMAIN}"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - brimble-monitoring-network
      - brimble-api-network
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki