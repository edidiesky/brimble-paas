networks:
  app-tier:
    driver: bridge
  selleasi-network:
    external: true
    name: development_selleasi-network

volumes:
  rabbitmq_data:
  redis-data:
  redis-insight-data:
  prom_data:
  grafana_data:
  tempo_data:

services:

  redis:
    image: redis:7.2-alpine
    container_name: scheduler_redis
    command: >
      redis-server
      --loglevel notice
      --maxmemory 2gb
      --maxmemory-policy volatile-lru
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite no
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --save 900 1
      --save 300 10
      --save 60 10000
      --stop-writes-on-bgsave-error yes
      --rdbcompression yes
      --activerehashing yes
      --hz 20
      --slowlog-log-slower-than 10000
      --slowlog-max-len 256
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-tier
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2200M
        reservations:
          memory: 512M

  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: scheduler_redis_insight
    ports:
      - "8001:8001"
    networks:
      - app-tier
    volumes:
      - redis-insight-data:/db
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: scheduler_redis_exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - app-tier
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: scheduler_rabbitmq
    hostname: scheduler-rabbit-1
    networks:
      - app-tier
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-scheduler_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-scheduler_pass}
      RABBITMQ_DEFAULT_VHOST: scheduler
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:latest
    container_name: scheduler_rabbitmq_exporter
    environment:
      RABBIT_URL: http://rabbitmq:15672
      RABBIT_USER: ${RABBITMQ_USER:-scheduler_user}
      RABBIT_PASSWORD: ${RABBITMQ_PASS:-scheduler_pass}
      RABBIT_VHOST: scheduler
      PUBLISH_PORT: "9419"
    ports:
      - "9419:9419"
    networks:
      - app-tier
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scheduler_service
    ports:
      - "4017:4017"
      - "9464:9464"
    environment:
      NODE_ENV: development
      PORT: 4017
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-scheduler_user}:${RABBITMQ_PASS:-scheduler_pass}@rabbitmq:5672/scheduler
      METRICS_PORT: 9464
      LOG_LEVEL: info
      SERVICE_NAME: scheduler-service
      INVENTORY_SERVICE_URL: http://inventory:4008
      ORDER_SERVICE_URL: http://orders:4012
      PAYMENT_SERVICE_URL: http://payment:4004
      NOTIFICATION_SERVICE_URL: http://selleasi-notification:4006
      REPORTING_SERVICE_URL: http://selleasi-stores:4007
    networks:
      - app-tier
      - selleasi-network
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service,env"
    labels:
      service: scheduler-service
      env: development
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    container_name: scheduler_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    networks:
      - app-tier
    restart: unless-stopped
    depends_on:
      - scheduler
      - redis-exporter
      - rabbitmq-exporter

  loki:
    image: grafana/loki:2.9.4
    container_name: scheduler_loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - app-tier
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.4
    container_name: scheduler_promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    networks:
      - app-tier
    restart: unless-stopped
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:latest
    container_name: scheduler_tempo
    user: "10001:10001"
    command: ["-config.file=/etc/tempo/tempo-config.yml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - tempo_data:/var/tempo
      - ./tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
    networks:
      - app-tier
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.1
    container_name: scheduler_grafana
    ports:
      - "3000:3000"
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - app-tier
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo